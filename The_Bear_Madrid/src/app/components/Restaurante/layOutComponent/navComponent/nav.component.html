  <nav class="navbar custom-navbar fixed-top">
      <div class="container-fluid d-flex justify-content-between align-items-center">

      <!-- Botón del menú a la izquierda -->
      <button class="navbar-toggler me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar"
        aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation" (click)="InnitTipos()">
        ☰
      </button>

      <!-- Contenedor centrado del logo -->
      <div class="logo-center mx-auto">
        <a [routerLink]="['/']" class="d-flex justify-content-center align-items-center">
          <img src="/the_bear_logo.jpg" alt="Logo The Bear" class="logo">
        </a>
      </div>
      
      <!-- Offcanvas -->
      <div class="offcanvas offcanvas-start custom-offcanvas" tabindex="-1" id="offcanvasDarkNavbar"
        aria-labelledby="offcanvasDarkNavbarLabel">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">The Bear Menu</h5>
          <button #btnCerrar type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
          <nav aria-label="breadcrumb">
            <ul class="breadcrumb">
              @for(tip of this.breadCrumb(); track $index)
              {
              <li class="breadcrumb-item" [ngClass]="{ 'active': $index === this.breadCrumb().length - 1 }">
                <a (click)="RecuperarSubTipo(tip)">{{ tip.nombreTipo }}</a>
              </li>
              }
            </ul>
          </nav>

          <div class="list-group">
            @for(tipo of this.tipos(); track $index)
            {
            <a class="list-group-item list-group-item-action" (click)="RecuperarSubTipo(tipo)">
              {{tipo.nombreTipo}}
            </a>
            }
          </div>
        </div>
      </div>
    </div>
