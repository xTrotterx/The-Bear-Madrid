<div class="card mb-3 mini-plato-card">
  <div class="row g-0 align-items-center">
    <!-- Imagen -->
    <div class="col-md-2 col-3">
      <img [src]="plato()?.imagen" 
           [alt]="plato()?.nombre" 
           class="img-fluid rounded-start mini-plato-img">
    </div>
    
    <!-- Info del plato -->
    <div class="col-md-4 col-9">
      <div class="card-body py-2 py-md-3">
        <h5 class="card-title mb-1 fs-6 fs-md-5">{{ plato()?.nombre }}</h5>
        <p class="card-text text-muted mb-0 small">{{ plato()?.precio }}€ / unidad</p>
      </div>
    </div>
    
    <!-- Controles de cantidad -->
    <div class="col-md-4 col-8">
      <div class="d-flex justify-content-center align-items-center gap-2">
        @if (cantidadActual() === 1) {
          <button 
            class="btn btn-sm btn-plato" 
            (click)="ModificaCantidad('eliminar')">
            <i class="bi bi-trash-fill"></i>
          </button>
        } @else {
          <button 
            class="btn btn-sm btn-plato" 
            (click)="ModificaCantidad('restar')">
            <i class="bi bi-dash-lg"></i>
          </button>
        }
        
        <input 
          type="text" 
          class="form-control form-control-sm text-center cantidad-input" 
          [value]="cantidadActual()"
          readonly>
        
        <button 
          class="btn btn-sm btn-plato" 
          (click)="ModificaCantidad('sumar')">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>
    
    <!-- Subtotal -->
    <div class="col-md-2 col-4">
      <div class="text-center">
        <strong class="fs-6 fs-md-5">{{ (plato()?.precio! * cantidadActual()) }}€</strong>
      </div>
    </div>
  </div>
</div>
