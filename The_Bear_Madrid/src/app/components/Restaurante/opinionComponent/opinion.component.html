<div class="card shadow-sm p-3 mb-3" style="border-radius: 12px; background-color: #ffffff;">
  <div class="d-flex align-items-start gap-3">
        <div class="flex-grow-1"></div>
            @if (opinion && opinion.titulo) {
            <h5><strong>{{ opinion.titulo }}</strong></h5>
            }
        </div>
    
      <div class="d-flex align-items-center mb-2">
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <i class="fas fa-star"
             [style.color]="i <= opinion.estrellas ? '#ffc107' : '#e0e0e0'"
             style="margin-right: 3px; font-size: 0.95rem;">
          </i>
        }

        <small class="text-muted ms-2">
          • {{ opinion.fecha }}
        </small>
      </div>

    @if (opinion && opinion.opinion) {
    <div class="row m-1">
        <div class="col-md">
            {{ opinion.opinion }}
        </div>
    </div>
    } @else {
    <div class="row m-1">
        <div class="col-md">
            No hay opiniones disponibles.
        </div>
    </div>
    }
</div>
